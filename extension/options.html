<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pinboard Saver — Settings</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 24px; max-width: 480px; color: #222; }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input { width: 100%; padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 16px; font-size: 14px; }
    .hint { color: #666; font-size: 13px; margin-top: 8px; }
    .status { margin-top: 12px; font-size: 14px; min-height: 1.2em; }
    .ok { color: #2a7f3a; }
    .err { color: #c33; }
    code { background: #f2f2f2; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h2>Pinboard API token</h2>
  <label for="token">Auth token (format: <code>username:HEXSTRING</code>)</label>
  <input id="token" type="text" autocomplete="off" spellcheck="false" placeholder="username:ABC123...">
  <p class="hint">Get yours from <a href="https://pinboard.in/settings/password" target="_blank" rel="noopener">pinboard.in/settings/password</a>.</p>
  <button id="save">Save</button>
  <div id="status" class="status"></div>

  <h2 style="margin-top:32px;">Last save result</h2>
  <pre id="last" style="background:#f2f2f2;padding:8px;border-radius:4px;font-size:12px;white-space:pre-wrap;word-break:break-all;">(none yet)</pre>
  <button id="refresh" style="margin-top:0;">Refresh</button>

  <script src="options.js"></script>
</body>
</html>
