<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pinboard Saver</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 8px; min-width: 220px; color: #222; }
    button { display: block; width: 100%; padding: 10px 12px; margin: 4px 0; font-size: 14px; text-align: left; background: #fff; border: 1px solid #d0d0d0; border-radius: 6px; cursor: pointer; }
    button:hover { background: #f2f6ff; border-color: #5a8dff; }
    button:active { background: #e3ecff; }
    #status { font-size: 12px; color: #666; min-height: 1.2em; padding: 4px 4px 0; }
    .ok { color: #2a7f3a; }
    .err { color: #c33; }
  </style>
</head>
<body>
  <button id="save-public">Save to pinboard.in (public)</button>
  <button id="save-private">Save to pinboard.in (private)</button>
  <button id="open-pinboard">Open pinboard.in</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
